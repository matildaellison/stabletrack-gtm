<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  input[type=number]:focus, textarea:focus { border-color: #C6761E !important; outline: none; }
  input[type=number] {
    font-family: 'Manrope', sans-serif; font-size: 13px;
    border: 1.5px solid rgba(126,74,23,0.14); border-radius: 7px;
    padding: 6px 10px; background: #F0E8DC; color: #2A1A0E;
    outline: none; width: 100%;
  }
  textarea {
    font-family: 'Manrope', sans-serif; font-size: 12px; line-height: 1.6;
    border: 1.5px solid rgba(126,74,23,0.14); border-radius: 8px;
    padding: 10px 14px; background: #F0E8DC; color: #2A1A0E;
    outline: none; resize: vertical; width: 100%;

  table { width: 100%; border-collapse: collapse; }
  th {
    font-size: 9px; font-weight: 800; letter-spacing: 0.12em;
    text-transform: uppercase; color: #9B7B5A;
    padding: 8px 10px; border-bottom: 1.5px solid rgba(126,74,23,0.14);
    text-align: left;
  }
  td {
    font-size: 12px; padding: 9px 10px;
    border-bottom: 1px solid #F0E8DC; vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #F0E8DC; }
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  @media (max-width: 900px) { .g4 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 640px) { .g3, .g2 { grid-template-columns: 1fr; } .g4 { grid-template-columns: 1fr 1fr; } }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px #C6761E33} 50%{box-shadow:0 0 0 6px #C6761E11} }
</style>
</head>

// ── COLOURS ───────────────────────────────────────────────────────────────────
const C = {
  amber:"#C6761E", brown:"#7E4A17", espresso:"#3E2723",
  cream:"#FDFBF7", creamDk:"#F0E8DC", border:"rgba(126,74,23,0.14)",

};

const $m = n => "$" + new Intl.NumberFormat().format(n);
const $n = n => new Intl.NumberFormat().format(n);

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function Card({ children, style={}, topAccent }) {
  return (
    <div style={{
      background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:10,
      padding:"18px 22px", borderTop: topAccent ? `3px solid ${topAccent}` : undefined, ...style,
    }}>{children}</div>
  );
}

function Lbl({ children, style={} }) {
  return <div style={{
    fontFamily:"Manrope,sans-serif", fontSize:9, fontWeight:800,
    letterSpacing:"0.16em", textTransform:"uppercase", color:C.muted, marginBottom:10, ...style,
  }}>{children}</div>;
}

function Badge({ children, color=C.amber }) {
  return <span style={{
    display:"inline-block", fontFamily:"Manrope,sans-serif", fontSize:9,
    fontWeight:800, letterSpacing:"0.08em", textTransform:"uppercase",
    padding:"2px 8px", borderRadius:4, background:color+"1A", color,
  }}>{children}</span>;
}

function Stat({ val, label, sub, accent=C.amber }) {
  return (
    <div style={{
      background:"#fff", border:`1.5px solid ${C.border}`,
      borderLeft:`4px solid ${accent}`, borderRadius:10, padding:"16px 18px",
    }}>
      <div style={{fontFamily:"Manrope,sans-serif", fontSize:20, fontWeight:700, color:C.espresso, lineHeight:1}}>{val}</div>
      <div style={{fontFamily:"Manrope,sans-serif", fontSize:12, fontWeight:600, marginTop:5}}>{label}</div>
      {sub && <div style={{fontFamily:"Manrope,sans-serif", fontSize:11, color:C.muted, marginTop:2}}>{sub}</div>}
    </div>
  );
}

function Bar({ pct, color=C.amber, h=6 }) {
  return (
    <div style={{height:h, background:C.creamDk, borderRadius:3, overflow:"hidden"}}>
      <div style={{height:"100%", width:`${Math.min(100,pct)}%`, background:color, borderRadius:3, transition:"width 0.4s"}} />
    </div>
  );
}

function Notice({ children, color=C.red }) {

}

function FieldInput({ label, value, onChange, prefix, suffix }) {

// ── SEQUENCE PLANNER ──────────────────────────────────────────────────────────
function SequencePlanner() {
  const [activeSeq, setActiveSeq] = useState("reactivation");
  const [extras, setExtras] = useState({});
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState({ day:"", subject:"", goal:"", type:"Custom" });
  const [notes, setNotes] = useState({});

  const seq = SEQUENCE_TEMPLATES[activeSeq];
  const all = [...seq.emails, ...(extras[activeSeq]||[])].sort((a,b)=>a.day-b.day);

  function addEmail() {
    if (!draft.day || !draft.subject) return;
    setExtras(p => ({ ...p, [activeSeq]: [...(p[activeSeq]||[]), {...draft, day:+draft.day, custom:true}] }));
    setDraft({ day:"", subject:"", goal:"", type:"Custom" });
    setAdding(false);
  }

  return (
    <div style={{display:"flex", flexDirection:"column", gap:20}}>
      <Card>
        <Lbl>Select Sequence</Lbl>
        <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
          {Object.entries(SEQUENCE_TEMPLATES).map(([key, s]) => (
            <button key={key} onClick={() => setActiveSeq(key)} style={{
              fontFamily:"Manrope,sans-serif", fontSize:11, fontWeight:700,
              padding:"7px 16px", borderRadius:6, cursor:"pointer",
              border:`1.5px solid ${activeSeq===key ? C.amber : C.border}`,
              background: activeSeq===key ? C.amber : "transparent",
              color: activeSeq===key ? "#fff" : C.muted, transition:"all 0.15s",
            }}>{s.name}</button>
          ))}
        </div>
      </Card>

      <div className="g3">
        <Stat val={all.length} label="Emails in sequence" sub={seq.channel} accent={C.amber} />
        <Stat val={`${all[all.length-1]?.day || 0} days`} label="Total sequence length" sub="From first send" accent={C.brown} />
        <Stat val={seq.audience.split("—")[0].trim()} label="Audience" sub={seq.audience.split("—")[1]?.trim()} accent={C.espresso} />
      </div>

      <Card>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16, flexWrap:"wrap", gap:8}}>
          <div>
            <Lbl style={{marginBottom:4}}>Sequence Plan</Lbl>
            <div style={{fontFamily:"Manrope,sans-serif", fontSize:13, fontWeight:700, color:C.espresso}}>{seq.name}</div>
            <div style={{fontFamily:"Manrope,sans-serif", fontSize:12, color:C.muted, marginTop:3}}>Goal: {seq.goal}</div>
          </div>
          <button onClick={() => setAdding(!adding)} style={{
            fontFamily:"Manrope,sans-serif", fontSize:11, fontWeight:700,
            padding:"7px 14px", borderRadius:6, cursor:"pointer",
            border:`1.5px solid ${C.amber}`, background:"transparent", color:C.amber,
          }}>+ Add Email</button>
        </div>

        {adding && (
          <div style={{background:C.creamDk, borderRadius:8, padding:14, marginBottom:16, display:"grid", gridTemplateColumns:"70px 1fr 1fr 100px", gap:10, alignItems:"end"}}>
            {[
              {label:"Day", key:"day", type:"number", placeholder:""},
              {label:"Subject line", key:"subject", type:"text", placeholder:"Enter subject..."},
              {label:"Email goal", key:"goal", type:"text", placeholder:"What should this achieve?"},
            ].map(f => (
              <div key={f.key}>
                <div style={{fontFamily:"Manrope,sans-serif", fontSize:9, fontWeight:800, color:C.muted, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:4}}>{f.label}</div>
                <input type={f.type} value={draft[f.key]} placeholder={f.placeholder}
                  onChange={e => setDraft(p => ({...p, [f.key]:e.target.value}))}
                  style={{width:"100%", fontFamily:"Manrope,sans-serif", fontSize:12, border:`1.5px solid ${C.border}`, borderRadius:6, padding:"6px 8px", background:"#fff", outline:"none"}} />
              </div>
            ))}
            <button onClick={addEmail} style={{
              fontFamily:"Manrope,sans-serif", fontSize:11, fontWeight:700,
              padding:"8px 14px", borderRadius:6, cursor:"pointer",
              background:C.amber, border:"none", color:"#fff",
            }}>Add</button>
          </div>
        )}

        <div style={{position:"relative"}}>
          <div style={{position:"absolute", left:36, top:12, bottom:12, width:2, background:C.border, borderRadius:2}} />
          {all.map((e, i) => (
            <div key={i} style={{display:"flex", gap:16, marginBottom:14, position:"relative"}}>
              <div style={{
                minWidth:72, height:40, borderRadius:6,
                background: e.custom ? C.espresso : C.amber,
                display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column",
                position:"relative", zIndex:1,
              }}>
                <div style={{fontFamily:"Manrope,sans-serif", fontSize:8, fontWeight:800, color:"rgba(255,255,255,0.65)", letterSpacing:"0.1em", textTransform:"uppercase"}}>Day</div>
                <div style={{fontFamily:"Manrope,sans-serif", fontSize:11, fontWeight:800, color:"#fff", lineHeight:1}}>{e.day}</div>
              </div>
              <div style={{flex:1, background:C.creamDk, borderRadius:8, padding:"10px 14px", border: e.custom ? `1.5px solid ${C.espresso}22` : undefined}}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, flexWrap:"wrap"}}>
                  <div style={{fontFamily:"Manrope,sans-serif", fontSize:13, fontWeight:700, color:C.espresso}}>{e.subject}</div>
                  <Badge color={e.custom ? C.espresso : C.brown}>{e.type || "Custom"}</Badge>
                </div>
                {e.goal && <div style={{fontFamily:"Manrope,sans-serif", fontSize:11, color:C.muted, marginTop:4, lineHeight:1.4}}>{e.goal}</div>}
              </div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <Lbl>Sequence Notes & Planning</Lbl>
        <textarea
          rows={6}
          value={notes[activeSeq] || ""}
          onChange={e => setNotes(p => ({...p, [activeSeq]: e.target.value}))}
          placeholder={`Notes for ${seq.name}...\n\n- Segments to include/exclude\n- A/B test ideas\n- Timing considerations\n- Landing pages needed`}
        />
      </Card>
    </div>
  );
}

// ── TABS ──────────────────────────────────────────────────────────────────────
// ── TOOLTIP ───────────────────────────────────────────────────────────────────
function Tip({ text, children }) {
  const [show, setShow] = useState(false);
  const [pos, setPos]   = useState({ x: 0, y: 0 });
  return (
    <span style={{ position: "relative", display: "inline-block" }}
      onMouseEnter={e => { setShow(true); setPos({ x: e.clientX, y: e.clientY }); }}
      onMouseLeave={() => setShow(false)}
      onMouseMove={e => setPos({ x: e.clientX, y: e.clientY })}
    >
      {children}
      <span style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        width: 13, height: 13, borderRadius: "50%",
        background: C.border, color: C.muted,
        fontSize: 8, fontWeight: 800, fontFamily: "Manrope,sans-serif",
        cursor: "default", marginLeft: 4, verticalAlign: "middle",
        border: `1px solid ${C.muted}44`,
      }}>?</span>
      {show && (
        <div style={{
          position: "fixed",
          left: pos.x + 12,
          top: pos.y - 8,
          zIndex: 9999,
          background: C.espresso,
          color: "#fff",
          fontFamily: "Manrope,sans-serif",
          fontSize: 11,
          lineHeight: 1.5,
          padding: "8px 12px",
          borderRadius: 7,
          maxWidth: 240,
          pointerEvents: "none",
          boxShadow: "0 4px 20px rgba(0,0,0,0.25)",
        }}>{text}</div>
      )}
    </span>
  );
}

// ── AI AGENT ──────────────────────────────────────────────────────────────────
function AIAgent() {
  const { useState: useS, useRef } = React;
  const [open, setOpen]     = useS(false);
  const [msgs, setMsgs]     = useS([{ role: "assistant", text: "Hi! I'm your StableTrack marketing assistant. Ask me anything about your pipeline, sequences, ICP, or what to prioritise next." }]);
  const [input, setInput]   = useS("");
  const [loading, setLoading] = useS(false);
  const bottomRef = React.useRef(null);

  React.useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" });
  }, [msgs]);

  async function send() {
    const q = input.trim();
    if (!q || loading) return;
    setInput("");
    const next = [...msgs, { role: "user", text: q }];
    setMsgs(next);
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `You are a sharp, concise marketing strategist embedded inside the StableTrack Marketing Command Center dashboard. You have deep context about StableTrack:

PRODUCT: StableTrack is an AI-first equine practice management platform, launched Jan 2026, built exclusively for horse vets. $199/mo Basic plan (first 3 months 50% off).

CURRENT STATUS (Mar 2026):
- 1 paying user, 41 inactive, 1 at-risk (43 total users tried)
- 805 contacts in HubSpot (528 missing — AAEP CSV not yet re-imported)
- 14 open pipeline deals ($2,388 each) — all AAEP survey respondents who requested follow-up
- 4 email sequences ready to launch: User Reactivation (41), AAEP Survey Follow-Up (14), AAEP Conference Nurture (930), Keystone Cross-Sell (425)

ICP: Primary = ambulatory equine vets; Secondary = equine-only clinics; Tertiary = teaching hospitals
COMPETITORS: ThoroVet, HVMS, Navetor, Cassadol
KEY ADVANTAGE: Only equine-specific PMS with native PACS integration (Asteris Keystone)
PARENT: Asteris (also makes Keystone PACS for veterinary imaging)

Be direct, specific, and actionable. Keep responses under 150 words. Use bullet points only when listing 3+ items. Never hedge unnecessarily.`,
          messages: next.map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.text })),
        }),
      });
      const data = await res.json();
      const reply = data?.content?.[0]?.text || "Sorry, something went wrong. Try again.";
      setMsgs(p => [...p, { role: "assistant", text: reply }]);
    } catch (e) {
      setMsgs(p => [...p, { role: "assistant", text: "Network error. Make sure you're connected and try again." }]);
    }
    setLoading(false);
  }

  function onKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }

  const SUGGESTIONS = [
    "What should I do first this week?",
    "Which of my 14 deals is most likely to convert?",
    "Write a subject line for the reactivation email",
    "How do I position against HVMS?",
  ];

  return (
    <>
      {/* FAB */}
      <button onClick={() => setOpen(!open)} style={{
        position: "fixed", bottom: 28, right: 28, zIndex: 1000,
        width: 52, height: 52, borderRadius: "50%",
        background: C.amber, border: "none", cursor: "pointer",
        boxShadow: "0 4px 20px rgba(198,118,30,0.45)",
        display: "flex", alignItems: "center", justifyContent: "center",
        transition: "transform 0.2s, box-shadow 0.2s",
        fontSize: 22,
      }}
        onMouseEnter={e => e.currentTarget.style.transform = "scale(1.1)"}
        onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
        title="Ask your marketing AI"
      >
        {open ? "✕" : "✦"}
      </button>

      {/* Panel */}
      {open && (
        <div style={{
          position: "fixed", bottom: 92, right: 28, zIndex: 1000,
          width: 360, maxHeight: 520,
          background: "#fff", borderRadius: 14,
          border: `1.5px solid ${C.border}`,
          boxShadow: "0 8px 40px rgba(62,39,35,0.18)",
          display: "flex", flexDirection: "column",
          overflow: "hidden",
        }}>
          {/* Header */}
          <div style={{ background: C.espresso, padding: "12px 16px", display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 8, height: 28, borderRadius: 3, background: C.amber }} />
            <div>
              <div style={{ fontFamily: "Fraunces,serif", color: "#fff", fontSize: 14, fontWeight: 600 }}>Marketing Assistant</div>
              <div style={{ color: C.muted, fontSize: 9, letterSpacing: ".12em", textTransform: "uppercase" }}>StableTrack context loaded</div>
            </div>
          </div>

          {/* Messages */}
          <div style={{ flex: 1, overflowY: "auto", padding: "14px 14px 8px", display: "flex", flexDirection: "column", gap: 10 }}>
            {msgs.map((m, i) => (
              <div key={i} style={{
                alignSelf: m.role === "user" ? "flex-end" : "flex-start",
                maxWidth: "85%",
                background: m.role === "user" ? C.amber : C.creamDk,
                color: m.role === "user" ? "#fff" : C.text,
                padding: "9px 12px",
                borderRadius: m.role === "user" ? "12px 12px 2px 12px" : "12px 12px 12px 2px",
                fontFamily: "Manrope,sans-serif", fontSize: 12, lineHeight: 1.55,
                whiteSpace: "pre-wrap",
              }}>{m.text}</div>
            ))}
            {loading && (
              <div style={{ alignSelf: "flex-start", background: C.creamDk, padding: "9px 14px", borderRadius: "12px 12px 12px 2px", fontFamily: "Manrope,sans-serif", fontSize: 12, color: C.muted }}>
                Thinking…
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          {/* Suggestions */}
          {msgs.length <= 1 && (
            <div style={{ padding: "0 14px 10px", display: "flex", flexWrap: "wrap", gap: 6 }}>
              {SUGGESTIONS.map((s, i) => (
                <button key={i} onClick={() => { setInput(s); }} style={{
                  fontFamily: "Manrope,sans-serif", fontSize: 10, fontWeight: 600,
                  padding: "4px 10px", borderRadius: 20,
                  border: `1.5px solid ${C.border}`,
                  background: "transparent", color: C.muted,
                  cursor: "pointer", transition: "all .15s",
                }}
                  onMouseEnter={e => { e.currentTarget.style.background = C.amber; e.currentTarget.style.color = "#fff"; e.currentTarget.style.borderColor = C.amber; }}
                  onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = C.muted; e.currentTarget.style.borderColor = C.border; }}
                >{s}</button>
              ))}
            </div>
          )}

          {/* Input */}
          <div style={{ padding: "10px 14px 12px", borderTop: `1px solid ${C.border}`, display: "flex", gap: 8 }}>
            <textarea
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={onKey}
              placeholder="Ask anything about StableTrack…"
              rows={2}
              style={{
                flex: 1, fontFamily: "Manrope,sans-serif", fontSize: 12,
                border: `1.5px solid ${C.border}`, borderRadius: 8,
                padding: "8px 10px", background: C.creamDk, color: C.text,
                resize: "none", outline: "none", lineHeight: 1.5,
              }}
            />
            <button onClick={send} disabled={loading || !input.trim()} style={{
              fontFamily: "Manrope,sans-serif", fontSize: 11, fontWeight: 700,
              padding: "0 14px", borderRadius: 8, cursor: loading ? "default" : "pointer",
              background: loading || !input.trim() ? C.creamDk : C.amber,
              border: "none", color: loading || !input.trim() ? C.muted : "#fff",
              transition: "all .15s",
            }}>Send</button>
          </div>
        </div>
      )}
    </>
  );
}

const PRIORITY_CONFIG = {
  urgent: { label: "Urgent",  color: C.red,    bg: C.red    + "12" },
  high:   { label: "High",    color: C.amber,  bg: C.amber  + "12" },
  medium: { label: "Medium",  color: C.blue,   bg: C.blue   + "12" },
  low:    { label: "Low",     color: C.muted,  bg: C.muted  + "12" },
};

const CAT_COLOR = {
  Email: C.amber, Data: C.blue, Outreach: C.green,
  CRM: C.brown, Strategy: C.espresso,
  Assets: C.yellow, Social: "#7C3AED",
};

function TaskBoard() {
  const [tasks, setTasks]       = React.useState(INITIAL_TASKS);
  const [filter, setFilter]     = React.useState("all");
  const [adding, setAdding]     = React.useState(false);
  const [newTask, setNewTask]   = React.useState({ title: "", desc: "", priority: "medium", category: "Email", dueDate: "", link: "", linkLabel: "" });

  function toggle(id) {
    setTasks(ts => ts.map(t => t.id === id ? { ...t, status: t.status === "done" ? "todo" : "done" } : t));
  }
  function bump(id, priority) {
    setTasks(ts => ts.map(t => t.id === id ? { ...t, priority } : t));
  }
  function addProgress(id, n) {
    setTasks(ts => ts.map(t => t.id === id ? { ...t, progress: Math.min(t.total, (t.progress || 0) + n) } : t));
  }
  function addTask() {
    if (!newTask.title.trim()) return;
    const links = newTask.link ? [{ label: newTask.linkLabel || newTask.link, url: newTask.link }] : [];
    setTasks(ts => [...ts, { ...newTask, id: Date.now(), status: "todo", links, progress: null, total: null }]);
    setNewTask({ title: "", desc: "", priority: "medium", category: "Email", dueDate: "", link: "", linkLabel: "" });
    setAdding(false);
  }

  const order   = ["urgent", "high", "medium", "low"];
  const counts  = { all: tasks.length, todo: tasks.filter(t => t.status !== "done").length, done: tasks.filter(t => t.status === "done").length };
  const visible = tasks
    .filter(t => filter === "all" || (filter === "done" ? t.status === "done" : t.status !== "done"))
    .sort((a, b) => order.indexOf(a.priority) - order.indexOf(b.priority));

  const pct = Math.round((tasks.filter(t => t.status === "done").length / tasks.length) * 100);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

      {/* Header stats */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 2fr", gap: 14 }}>
        <div style={{ background: "#fff", border: `1.5px solid ${C.border}`, borderLeft: `4px solid ${C.amber}`, borderRadius: 10, padding: "14px 18px" }}>
          <div style={{ fontFamily: "Manrope,sans-serif", fontSize: 18, fontWeight: 700, color: C.espresso }}>{counts.todo}</div>
          <div style={{ fontSize: 11, fontWeight: 600, marginTop: 4 }}>Open tasks</div>
        </div>
        <div style={{ background: "#fff", border: `1.5px solid ${C.border}`, borderLeft: `4px solid ${C.green}`, borderRadius: 10, padding: "14px 18px" }}>
          <div style={{ fontFamily: "Manrope,sans-serif", fontSize: 18, fontWeight: 700, color: C.espresso }}>{counts.done}</div>
          <div style={{ fontSize: 11, fontWeight: 600, marginTop: 4 }}>Completed</div>
        </div>
        <div style={{ background: "#fff", border: `1.5px solid ${C.border}`, borderLeft: `4px solid ${C.red}`, borderRadius: 10, padding: "14px 18px" }}>
          <div style={{ fontFamily: "Manrope,sans-serif", fontSize: 18, fontWeight: 700, color: C.espresso }}>{tasks.filter(t => t.priority === "urgent" && t.status !== "done").length}</div>
          <div style={{ fontSize: 11, fontWeight: 600, marginTop: 4 }}>Urgent remaining</div>
        </div>
        <div style={{ background: "#fff", border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "14px 18px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 600 }}>Overall progress</div>
            <div style={{ fontFamily: "Fraunces,serif", fontSize: 14, fontWeight: 700, color: C.amber }}>{pct}%</div>
          </div>
          <Bar pct={pct} h={8} />
          <div style={{ fontSize: 10, color: C.muted, marginTop: 6 }}>{counts.done} of {tasks.length} tasks complete</div>
        </div>
      </div>

      {/* Filter + add */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", gap: 6 }}>
          {[["all","All"],["todo","Open"],["done","Done"]].map(([v, l]) => (
            <button key={v} onClick={() => setFilter(v)} style={{
              fontFamily: "Manrope,sans-serif", fontSize: 11, fontWeight: 700,
              padding: "6px 14px", borderRadius: 6, cursor: "pointer",
              border: `1.5px solid ${filter === v ? C.amber : C.border}`,
              background: filter === v ? C.amber : "transparent",
              color: filter === v ? "#fff" : C.muted,
            }}>{l} ({counts[v] ?? tasks.length})</button>
          ))}
        </div>
        <button onClick={() => setAdding(!adding)} style={{
          fontFamily: "Manrope,sans-serif", fontSize: 11, fontWeight: 700,
          padding: "7px 16px", borderRadius: 6, cursor: "pointer",
          border: `1.5px solid ${C.amber}`, background: "transparent", color: C.amber,
        }}>+ Add Task</button>
      </div>

      {/* Add task form */}
      {adding && (
        <Card style={{ background: C.creamDk }}>
          <Lbl>New Task</Lbl>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 9, fontWeight: 800, color: C.muted, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Title *</div>
              <input value={newTask.title} onChange={e => setNewTask(p => ({ ...p, title: e.target.value }))} placeholder="Task title..."
                style={{ width: "100%", fontFamily: "Manrope,sans-serif", fontSize: 12, border: `1.5px solid ${C.border}`, borderRadius: 6, padding: "7px 10px", background: "#fff" }} />
            </div>
            <div>
              <div style={{ fontSize: 9, fontWeight: 800, color: C.muted, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Due Date</div>
              <input value={newTask.dueDate} onChange={e => setNewTask(p => ({ ...p, dueDate: e.target.value }))} placeholder="e.g. Mar 20"
                style={{ width: "100%", fontFamily: "Manrope,sans-serif", fontSize: 12, border: `1.5px solid ${C.border}`, borderRadius: 6, padding: "7px 10px", background: "#fff" }} />
            </div>
            <div>
              <div style={{ fontSize: 9, fontWeight: 800, color: C.muted, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Priority</div>
              <select value={newTask.priority} onChange={e => setNewTask(p => ({ ...p, priority: e.target.value }))}
                style={{ width: "100%", fontFamily: "Manrope,sans-serif", fontSize: 12, border: `1.5px solid ${C.border}`, borderRadius: 6, padding: "7px 10px", background: "#fff" }}>
                <option value="urgent">Urgent</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
              </select>
            </div>
            <div>
              <div style={{ fontSize: 9, fontWeight: 800, color: C.muted, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Category</div>
              <select value={newTask.category} onChange={e => setNewTask(p => ({ ...p, category: e.target.value }))}
                style={{ width: "100%", fontFamily: "Manrope,sans-serif", fontSize: 12, border: `1.5px solid ${C.border}`, borderRadius: 6, padding: "7px 10px", background: "#fff" }}>
                <option>Email</option><option>Data</option><option>Outreach</option><option>CRM</option><option>Strategy</option><option>Content</option>
              </select>
            </div>
            <div>
              <div style={{ fontSize: 9, fontWeight: 800, color: C.muted, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Link URL</div>
              <input value={newTask.link} onChange={e => setNewTask(p => ({ ...p, link: e.target.value }))} placeholder="https://..."
                style={{ width: "100%", fontFamily: "Manrope,sans-serif", fontSize: 12, border: `1.5px solid ${C.border}`, borderRadius: 6, padding: "7px 10px", background: "#fff" }} />
            </div>
            <div>
              <div style={{ fontSize: 9, fontWeight: 800, color: C.muted, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Link Label</div>
              <input value={newTask.linkLabel} onChange={e => setNewTask(p => ({ ...p, linkLabel: e.target.value }))} placeholder="e.g. HubSpot Sequence"
                style={{ width: "100%", fontFamily: "Manrope,sans-serif", fontSize: 12, border: `1.5px solid ${C.border}`, borderRadius: 6, padding: "7px 10px", background: "#fff" }} />
            </div>
          </div>
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 9, fontWeight: 800, color: C.muted, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Description</div>
            <textarea value={newTask.desc} onChange={e => setNewTask(p => ({ ...p, desc: e.target.value }))} placeholder="Details..."
              style={{ width: "100%", minHeight: 60, fontFamily: "Manrope,sans-serif", fontSize: 12, border: `1.5px solid ${C.border}`, borderRadius: 6, padding: "7px 10px", background: "#fff", resize: "vertical" }} />
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={addTask} style={{ fontFamily: "Manrope,sans-serif", fontSize: 11, fontWeight: 700, padding: "7px 18px", borderRadius: 6, cursor: "pointer", background: C.amber, border: "none", color: "#fff" }}>Add Task</button>
            <button onClick={() => setAdding(false)} style={{ fontFamily: "Manrope,sans-serif", fontSize: 11, fontWeight: 700, padding: "7px 14px", borderRadius: 6, cursor: "pointer", background: "transparent", border: `1.5px solid ${C.border}`, color: C.muted }}>Cancel</button>
          </div>
        </Card>
      )}

      {/* Task list */}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {visible.map(t => {
          const p = PRIORITY_CONFIG[t.priority] || PRIORITY_CONFIG.medium;
          const catColor = CAT_COLOR[t.category] || C.muted;
          const done = t.status === "done";
          return (
            <div key={t.id} style={{
              background: done ? C.creamDk : "#fff",
              border: `1.5px solid ${done ? C.border : p.color + "33"}`,
              borderLeft: `4px solid ${done ? C.muted : p.color}`,
              borderRadius: 10, padding: "14px 18px",
              opacity: done ? 0.7 : 1,
              transition: "all .2s",
            }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                {/* Checkbox */}
                <div onClick={() => toggle(t.id)} style={{
                  minWidth: 20, height: 20, borderRadius: 5, marginTop: 1, cursor: "pointer",
                  border: `2px solid ${done ? C.green : p.color}`,
                  background: done ? C.green : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  transition: "all .15s",
                }}>
                  {done && <span style={{ color: "#fff", fontSize: 11, fontWeight: 800 }}>✓</span>}
                </div>

                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 6 }}>
                    <div style={{ fontFamily: "Manrope,sans-serif", fontSize: 13, fontWeight: 700, color: done ? C.muted : C.espresso, textDecoration: done ? "line-through" : "none" }}>{t.title}</div>
                    <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                      {t.startDate && t.endDate ? (
                        <span style={{ fontFamily:"Manrope,sans-serif", fontSize:9, fontWeight:700, color:C.muted, background:C.creamDk, padding:"2px 8px", borderRadius:4 }}>
                          📅 {t.startDate} → {t.endDate}
                        </span>
                      ) : t.dueDate ? (
                        <span style={{ fontFamily:"Manrope,sans-serif", fontSize:9, fontWeight:800, color:C.muted, letterSpacing:".08em" }}>Due {t.dueDate}</span>
                      ) : null}
                      <Badge color={catColor}>{t.category}</Badge>
                      <select value={t.priority} onChange={e => bump(t.id, e.target.value)}
                        style={{ fontFamily: "Manrope,sans-serif", fontSize: 9, fontWeight: 800, letterSpacing: ".08em", textTransform: "uppercase", padding: "2px 6px", borderRadius: 4, border: `1.5px solid ${p.color}44`, background: p.bg, color: p.color, cursor: "pointer" }}>
                        <option value="urgent">Urgent</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
                      </select>
                    </div>
                  </div>

                  {t.desc && <div style={{ fontFamily: "Manrope,sans-serif", fontSize: 11, color: C.muted, marginTop: 4, lineHeight: 1.5 }}>{t.desc}</div>}

                  {/* Progress bar for tracked tasks */}
                  {t.progress !== null && t.total !== null && (
                    <div style={{ marginTop: 8 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                        <span style={{ fontSize: 10, color: C.muted }}>{t.progressLabel}</span>
                        <span style={{ fontSize: 10, fontWeight: 700, color: C.amber }}>{t.progress} / {t.total}</span>
                      </div>
                      <Bar pct={(t.progress / t.total) * 100} h={5} />
                      {t.id <= 2 && !done && (
                        <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                          {[1, 2, 3].map(n => (
                            <button key={n} onClick={() => addProgress(t.id, n)} style={{
                              fontFamily: "Manrope,sans-serif", fontSize: 9, fontWeight: 700,
                              padding: "2px 8px", borderRadius: 4, cursor: "pointer",
                              border: `1px solid ${C.amber}`, background: "transparent", color: C.amber,
                            }}>+{n} email{n > 1 ? "s" : ""}</button>
                          ))}
                        </div>
                      )}
                    </div>
                  )}

                  {/* Links */}
                  {t.links && t.links.length > 0 && (
                    <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" }}>
                      {t.links.map((lnk, i) => (
                        <a key={i} href={lnk.url} target="_blank" rel="noopener noreferrer" style={{
                          fontFamily: "Manrope,sans-serif", fontSize: 10, fontWeight: 700,
                          color: C.amber, textDecoration: "none",
                          padding: "2px 10px", borderRadius: 4,
                          border: `1px solid ${C.amber}44`,
                          background: C.amber + "0D",
                        }}>↗ {lnk.label}</a>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  info:     { bg:"#EFF6FF", border:"#93C5FD", icon:C.blue,   label:"INFO"     },

function AlertBar({ onNavigate }) {
  const [dismissed, setDismissed] = React.useState([]);
  const visible = ALERTS.filter(a => !dismissed.includes(a.id));
  if (!visible.length) return null;
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:4 }}>
      {visible.map(a => {
        const s = ALERT_STYLE[a.level];
        return (
          <div key={a.id} style={{ display:"flex", alignItems:"center", gap:10, background:s.bg, border:`1.5px solid ${s.border}`, borderRadius:8, padding:"9px 14px", flexWrap:"wrap" }}>
            <span style={{ fontSize:14 }}>{a.icon}</span>
            <span style={{ fontFamily:"Manrope,sans-serif", fontSize:11, fontWeight:700, color:s.icon, letterSpacing:".08em", textTransform:"uppercase", minWidth:60 }}>{s.label}</span>
            <span style={{ fontFamily:"Manrope,sans-serif", fontSize:12, color:C.text, flex:1 }}>{a.msg}</span>
            {a.url && <a href={a.url} target="_blank" rel="noopener noreferrer" style={{ fontFamily:"Manrope,sans-serif", fontSize:10, fontWeight:800, color:s.icon, background:"transparent", border:`1px solid ${s.icon}44`, borderRadius:4, padding:"3px 10px", textDecoration:"none", whiteSpace:"nowrap" }}>↗ {a.action}</a>}
            {a.tab && <button onClick={() => onNavigate(a.tab)} style={{ fontFamily:"Manrope,sans-serif", fontSize:10, fontWeight:800, color:s.icon, background:"transparent", border:`1px solid ${s.icon}44`, borderRadius:4, padding:"3px 10px", cursor:"pointer", whiteSpace:"nowrap" }}>→ {a.action}</button>}
            <button onClick={() => setDismissed(d => [...d, a.id])} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:14, padding:"0 2px", lineHeight:1 }}>×</button>
          </div>
        );
      })}
    </div>
  );
}

// ── MINI TASK WIDGET ──────────────────────────────────────────────────────────
function MiniTaskWidget({ onNavigate }) {
  const urgent = INITIAL_TASKS.filter(t => t.priority === "urgent" && t.status !== "done");

  const pct    = Math.round((done.length / INITIAL_TASKS.length) * 100);
  return (
    <Card>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
        <Lbl style={{ marginBottom:0 }}>Tasks & Actions</Lbl>
        <button onClick={() => onNavigate("tasks")} style={{ fontFamily:"Manrope,sans-serif", fontSize:10, fontWeight:800, color:C.amber, background:"transparent", border:`1px solid ${C.amber}44`, borderRadius:4, padding:"3px 12px", cursor:"pointer" }}>View All Tasks →</button>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:14 }}>
        {[
          { val: urgent.length, label:"Urgent",    color: C.red    },
          { val: high.length,   label:"High",      color: C.amber  },
          { val: done.length,   label:"Completed", color: C.green  },
          { val: pct+"%",       label:"Progress",  color: C.blue   },
        ].map(s => (
          <div key={s.label} style={{ textAlign:"center", padding:"10px 6px", background:C.creamDk, borderRadius:8 }}>
            <div style={{ fontFamily:"Manrope,sans-serif", fontSize:18, fontWeight:700, color:s.color }}>{s.val}</div>
            <div style={{ fontFamily:"Manrope,sans-serif", fontSize:10, fontWeight:700, color:C.muted, marginTop:3, textTransform:"uppercase", letterSpacing:".08em" }}>{s.label}</div>
          </div>
        ))}
      </div>
      <Bar pct={pct} h={6} />
      <div style={{ marginTop:12, display:"flex", flexDirection:"column", gap:5 }}>
        {[...urgent, ...high].slice(0,4).map(t => (
          <div key={t.id} onClick={() => onNavigate("tasks")} style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", padding:"5px 8px", borderRadius:6, background:"#fff", border:`1px solid ${C.border}` }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background: t.priority==="urgent" ? C.red : C.amber, flexShrink:0 }} />
            <span style={{ fontFamily:"Manrope,sans-serif", fontSize:11, color:C.text, flex:1 }}>{t.title}</span>

          </div>
        ))}
      </div>
    </Card>
  );
}

  function addItem() {
    if (!newItem.trim()) return;
    setLog(l => [...l, { id: Date.now(), status:"queued", ts:"Just added", icon:"📋", msg: newItem.trim(), link:null }]);
    setNewItem("");

    setLog(l => l.map(i => i.id === id ? { ...i, status:"done", icon:"✅", ts:"Just now" } : i));

        </div>
      )}
    </div>
  );
}

function KpiRow({ kpi, actual, onUpdate }) {
  const [editing, setEditing] = React.useState(false);
  const [input, setInput]     = React.useState(actual !== null && actual !== undefined ? String(actual) : "");
  const [showDetail, setShowDetail] = React.useState(false);
  const gc = KPI_GROUP_COLOR[kpi.group] || C.amber;

  const pct = kpi.format === "bool"
    ? (actual >= 1 ? 100 : 0)
    : kpi.format === "pct"
      ? actual !== null ? Math.min(100, Math.round((actual / kpi.target) * 100)) : 0
      : actual !== null ? Math.min(100, Math.round(((actual - kpi.baseline) / (kpi.target - kpi.baseline)) * 100)) : 0;

  const done   = actual !== null && (kpi.format === "bool" ? actual >= 1 : actual >= kpi.target);
  const behind = actual !== null && pct < 50;

  const statusColor = done ? C.green : behind ? C.red : C.amber;
  const statusLabel = done ? "✓ Done" : actual !== null ? `${pct}%` : "Not set";

  function saveVal() {
    const v = parseFloat(input);
    if (!isNaN(v)) onUpdate(kpi.id, v);
    else if (input.toLowerCase() === "yes" || input.toLowerCase() === "y") onUpdate(kpi.id, 1);
    setEditing(false);
  }

  function fmtActual(v) {
    if (v === null || v === undefined) return "—";
    if (kpi.format === "bool") return v >= 1 ? "Yes ✓" : "No";
    if (kpi.format === "pct") return v + "%";
    return v.toLocaleString();
  }
  function fmtTarget(v) {
    if (kpi.format === "bool") return "Yes";
    if (kpi.format === "pct") return v + "%";
    return v.toLocaleString();
  }

  return (
    <div style={{ borderRadius:8, border:`1px solid ${done ? C.green+"33" : behind ? C.red+"33" : C.border}`, background: done ? "#F0FDF4" : "#fff", overflow:"hidden" }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px" }}>
        {/* status dot */}
        <div style={{ width:10, height:10, borderRadius:"50%", background:statusColor, flexShrink:0 }} />
        {/* icon + label */}
        <span style={{ fontSize:14, flexShrink:0 }}>{kpi.icon}</span>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontFamily:"Manrope,sans-serif", fontSize:12, fontWeight:700, color:C.espresso, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{kpi.label}</div>
          <div style={{ display:"flex", gap:6, alignItems:"center", marginTop:3 }}>
            <span style={{ fontFamily:"Manrope,sans-serif", fontSize:9, fontWeight:800, letterSpacing:".08em", textTransform:"uppercase", color:gc, background:gc+"15", padding:"1px 6px", borderRadius:3 }}>{kpi.group}</span>
            <span style={{ fontFamily:"Manrope,sans-serif", fontSize:10, color:C.muted }}>baseline <strong>{kpi.format === "bool" ? "No" : kpi.format === "pct" ? kpi.baseline+"%" : kpi.baseline.toLocaleString()}</strong> → target <strong style={{ color:gc }}>{fmtTarget(kpi.target)} {kpi.unit !== "yes/no" ? kpi.unit : ""}</strong></span>
          </div>
        </div>
        {/* progress bar */}
        <div style={{ width:80, flexShrink:0 }}>
          <div style={{ height:5, background:C.creamDk, borderRadius:3, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${pct}%`, background:statusColor, borderRadius:3, transition:"width .3s" }} />
          </div>
        </div>
        {/* actual input */}
        <div style={{ flexShrink:0, textAlign:"right" }}>
          {editing ? (
            <div style={{ display:"flex", gap:4 }}>
              <input autoFocus value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key==="Enter" && saveVal()}
                placeholder={kpi.format === "bool" ? "yes/no" : "enter value"}
                style={{ width:70, fontFamily:"Manrope,sans-serif", fontSize:11, border:`1.5px solid ${C.amber}`, borderRadius:4, padding:"3px 6px" }} />
              <button onClick={saveVal} style={{ fontFamily:"Manrope,sans-serif", fontSize:10, fontWeight:800, padding:"3px 8px", borderRadius:4, background:C.amber, border:"none", color:"#fff", cursor:"pointer" }}>✓</button>
            </div>
          ) : (
            <div onClick={() => setEditing(true)} style={{ cursor:"pointer", fontFamily:"Manrope,sans-serif", fontSize:12, fontWeight:700, color:statusColor, padding:"3px 8px", borderRadius:4, background:statusColor+"15", border:`1px solid ${statusColor}33`, whiteSpace:"nowrap" }}>
              {fmtActual(actual)} <span style={{ fontSize:9, color:C.muted }}>✏</span>
            </div>
          )}
        </div>
        {/* detail toggle */}
        <button onClick={() => setShowDetail(d => !d)} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:13, padding:0, flexShrink:0 }}>{showDetail ? "▲" : "▼"}</button>
        {kpi.hubspotUrl && <a href={kpi.hubspotUrl} target="_blank" rel="noopener noreferrer" style={{ fontFamily:"Manrope,sans-serif", fontSize:9, fontWeight:800, color:C.amber, textDecoration:"none", flexShrink:0 }}>↗</a>}
      </div>
      {showDetail && (
        <div style={{ borderTop:`1px solid ${C.border}`, padding:"10px 14px", background:C.creamDk, display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          <div><div style={{ fontFamily:"Manrope,sans-serif", fontSize:9, fontWeight:800, letterSpacing:".1em", textTransform:"uppercase", color:C.muted, marginBottom:3 }}>Why it matters</div><div style={{ fontFamily:"Manrope,sans-serif", fontSize:11, color:C.text, lineHeight:1.5 }}>{kpi.why}</div></div>
          <div><div style={{ fontFamily:"Manrope,sans-serif", fontSize:9, fontWeight:800, letterSpacing:".1em", textTransform:"uppercase", color:C.muted, marginBottom:3 }}>How to hit it</div><div style={{ fontFamily:"Manrope,sans-serif", fontSize:11, color:C.text, lineHeight:1.5 }}>{kpi.how}</div></div>
        </div>
      )}
    </div>
  );
}

function KpiScorecard() {
  const emptyActuals = Object.fromEntries([...WEEK1_KPIS, ...WEEK2_KPIS].map(k => [k.id, null]));
  const [actuals, setActuals] = React.useState(emptyActuals);
  const [week, setWeek]       = React.useState("w1");

  // Seed known values
  React.useEffect(() => {
    setActuals(a => ({
      ...a,
      w1_4: 1055,  // contacts imported
      w1_1: 0,     // deals contacted
      w2_6: 1,     // baseline 1 paying customer
    }));
  }, []);

  function updateActual(id, val) {
    setActuals(a => ({ ...a, [id]: val }));
  }

  const kpis   = week === "w1" ? WEEK1_KPIS : WEEK2_KPIS;
  const done   = kpis.filter(k => { const a = actuals[k.id]; return a !== null && (k.format === "bool" ? a >= 1 : a >= k.target); }).length;
  const behind = kpis.filter(k => { const a = actuals[k.id]; if (a === null) return false; const pct = k.format === "bool" ? (a>=1?100:0) : k.format==="pct" ? (a/k.target)*100 : ((a-k.baseline)/(k.target-k.baseline))*100; return pct < 50; }).length;
  const notset = kpis.filter(k => actuals[k.id] === null).length;
  const ovPct  = Math.round((done / kpis.length) * 100);

  const dateRange = week === "w1" ? "Mar 12 – 19" : "Mar 20 – 26";

  return (
    <Card>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:10 }}>
        <div>
          <Lbl style={{ marginBottom:2 }}>Weekly KPI Scorecard</Lbl>
          <div style={{ fontFamily:"Manrope,sans-serif", fontSize:11, color:C.muted }}>Click any actual value to update · expand ▼ for why + how</div>
        </div>
        <div style={{ display:"flex", gap:6 }}>
          {[["w1","Week 1 · "+dateRange],["w2","Week 2 · Mar 20–26"]].map(([v,l]) => (
            <button key={v} onClick={() => setWeek(v)} style={{ fontFamily:"Manrope,sans-serif", fontSize:10, fontWeight:700, padding:"5px 12px", borderRadius:6, cursor:"pointer", border:`1.5px solid ${week===v ? C.amber : C.border}`, background: week===v ? C.amber : "transparent", color: week===v ? "#fff" : C.muted }}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* Summary strip */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:14 }}>
        {[
          { val:done,      label:"On track",  color:C.green },
          { val:behind,    label:"Behind",    color:C.red   },
          { val:notset,    label:"Not set",   color:C.muted },
          { val:ovPct+"%", label:"Complete",  color:C.amber },
        ].map(s => (
          <div key={s.label} style={{ background:C.creamDk, borderRadius:7, padding:"8px 12px", textAlign:"center" }}>
            <div style={{ fontFamily:"Manrope,sans-serif", fontSize:18, fontWeight:700, color:s.color }}>{s.val}</div>
            <div style={{ fontFamily:"Manrope,sans-serif", fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:C.muted, marginTop:2 }}>{s.label}</div>
          </div>
        ))}
      </div>
      <Bar pct={ovPct} h={5} style={{ marginBottom:16 }} />

      {/* KPI rows */}
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        {kpis.map(k => <KpiRow key={k.id} kpi={k} actual={actuals[k.id]} onUpdate={updateActual} />)}
      </div>

      {/* Legend */}
      <div style={{ display:"flex", gap:16, marginTop:12, flexWrap:"wrap" }}>
        {[["🟢","On / done"],["🟡","In progress < 50%"],["🔴","Behind"],["—","Not yet entered"]].map(([i,l]) => (
          <span key={l} style={{ fontFamily:"Manrope,sans-serif", fontSize:10, color:C.muted }}>{i} {l}</span>
        ))}
        <span style={{ fontFamily:"Manrope,sans-serif", fontSize:10, color:C.muted, marginLeft:"auto" }}>✏ = click to edit actual</span>
      </div>
    </Card>
  );
}

                  {s.items.map((it,j) => (
                    <div key={j} style={{fontFamily:"Manrope,sans-serif", fontSize:12, marginBottom:5, lineHeight:1.4}}>{it}</div>
                  ))}
                </div>
              ))}
            </div>
          </Card>
        </>}

      </div>

      {/* FOOTER */}
      <div style={{borderTop:`1px solid ${C.border}`, padding:"12px 28px", display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:8, marginTop:12}}>
        <span style={{fontFamily:"Manrope,sans-serif", fontSize:10, color:C.muted}}>HubSpot: 805 contacts · 14 pipeline deals · 1 paying user · 41 inactive · 43 total users · Mar 11, 2026</span>
        <span style={{fontFamily:"Manrope,sans-serif", fontSize:10, color:C.muted}}>StableTrack — Marketing Command Center</span>
      </div>
      <AIAgent />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
